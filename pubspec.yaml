name: renewtrack
description: Manage all your client renewals — domains, servers, subscriptions and more.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.jpeg"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/logo.jpeg"

flutter:
  uses-material-design: true
  # Uncomment to add Nunito or any Google Font:
  # fonts:
  #   - family: Nunito
  #     fonts:
  #       - asset: fonts/Nunito-Regular.ttf
  #       - asset: fonts/Nunito-SemiBold.ttf
  #         weight: 600
  #       - asset: fonts/Nunito-Bold.ttf
  #         weight: 700
  #       - asset: fonts/Nunito-ExtraBold.ttf
  #         weight: 800
